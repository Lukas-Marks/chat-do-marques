<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat do Marques</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #16161a;
      --panel:     #1c1c22;
      --border:    #2a2a35;
      --accent:    #7c6af7;
      --accent2:   #f76a8c;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --mine-bg:   #2a2060;
      --mine-text: #d4ccff;
      --other-bg:  #1e1e28;
      --other-text:#c8c8d8;
      --radius:    18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .4;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-dot {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-sub {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .online-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
    }

    .online-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade8088;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── MESSAGES ── */
    #messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      position: relative;
      z-index: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #messages-wrap::-webkit-scrollbar { width: 4px; }
    #messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    #messages { list-style: none; display: contents; }

    /* Date / system messages */
    .sys-msg {
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.25rem 0;
    }

    /* Bubble rows */
    .bubble-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      animation: fadeUp 0.25s ease both;
    }

    .bubble-row.mine { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      color: #fff;
    }

    .avatar.mine-av  { background: linear-gradient(135deg, var(--accent), #a78bfa); }
    .avatar.other-av { background: linear-gradient(135deg, #334155, #475569); }

    /* Bubble */
    .bubble {
      max-width: min(70%, 380px);
      padding: 0.65rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.45;
      position: relative;
    }

    .bubble.mine {
      background: var(--mine-bg);
      color: var(--mine-text);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 24px #7c6af712;
    }

    .bubble.other {
      background: var(--other-bg);
      color: var(--other-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .bubble .sender {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 3px;
      opacity: 0.7;
    }

    .bubble.mine .sender { color: #a78bfa; }
    .bubble.other .sender { color: var(--accent2); }

    .bubble .msg-time {
      display: block;
      font-size: 0.62rem;
      color: var(--muted);
      text-align: right;
      margin-top: 4px;
    }

    /* ── FORM ── */
    #form-area {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0.85rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    #input {
      flex: 1;
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0.7rem 1.1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #input::placeholder { color: var(--muted); }

    #input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #7c6af722;
    }

    #send-btn {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border: none;
      border-radius: 14px;
      padding: 0 1.2rem;
      height: 44px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    #send-btn:hover  { opacity: .88; }
    #send-btn:active { transform: scale(0.96); }

    #send-btn svg { width: 16px; height: 16px; }

    /* ── MODAL (prompt replacement) ── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 32px 64px #00000066;
      text-align: center;
      animation: modalIn 0.35s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-icon {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      margin: 0 auto 1.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }

    #modal h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      margin-bottom: 0.4rem;
      letter-spacing: -0.03em;
    }

    #modal p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    #modal-input {
      width: 100%;
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }

    #modal-input::placeholder { color: var(--muted); }
    #modal-input:focus { border-color: var(--accent); }

    #modal-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 0.85rem;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    #modal-btn:hover  { opacity: .88; }
    #modal-btn:active { transform: scale(0.97); }

    /* ── TYPING indicator ── */
    .typing-indicator {
      display: flex; gap: 4px; align-items: center;
      padding: 0.5rem 0.8rem;
    }

    .typing-indicator span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>

<!-- NAME MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-icon">💬</div>
    <h2>Chat do Marques</h2>
    <p>Escolha um apelido para entrar na sala.</p>
    <input id="modal-input" type="text" maxlength="20" placeholder="Seu nome…" autocomplete="off"/>
    <button id="modal-btn">Entrar na sala →</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo-dot">✦</div>
  <div>
    <div class="header-title">Chat do Marques</div>
    <div class="header-sub">sala pública</div>
  </div>
  <div class="online-pill">
    <span class="online-dot"></span>
    <span id="online-count">online</span>
  </div>
</header>

<!-- MESSAGES -->
<div id="messages-wrap">
  <ul id="messages"></ul>
</div>

<!-- INPUT AREA -->
<div id="form-area">
  <input id="input" autocomplete="off" placeholder="Mensagem…" />
  <button id="send-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
    Enviar
  </button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  var socket = io();
  var nome = null;

  /* ── HELPERS ── */
  function getInitial(name) {
    return name ? name.charAt(0).toUpperCase() : '?';
  }

  function getTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    var wrap = document.getElementById('messages-wrap');
    wrap.scrollTop = wrap.scrollHeight;
  }

  function addMessage(obj, isMine) {
    var messages = document.getElementById('messages');

    var row = document.createElement('li');
    row.className = 'bubble-row' + (isMine ? ' mine' : '');

    var av = document.createElement('div');
    av.className = 'avatar ' + (isMine ? 'mine-av' : 'other-av');
    av.textContent = getInitial(obj.nome);

    var bubble = document.createElement('div');
    bubble.className = 'bubble ' + (isMine ? 'mine' : 'other');

    var sender = document.createElement('span');
    sender.className = 'sender';
    sender.textContent = obj.nome;

    var text = document.createElement('span');
    text.textContent = obj.msg;

    var time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = getTime();

    bubble.appendChild(sender);
    bubble.appendChild(text);
    bubble.appendChild(time);
    row.appendChild(av);
    row.appendChild(bubble);
    messages.appendChild(row);
    scrollBottom();
  }

  /* ── MODAL ── */
  var modalOverlay = document.getElementById('modal-overlay');
  var modalInput   = document.getElementById('modal-input');
  var modalBtn     = document.getElementById('modal-btn');

  modalInput.focus();

  function submitName() {
    var val = modalInput.value.trim();
    if (!val) { modalInput.focus(); return; }
    nome = val;
    socket.emit('new user', nome);
  }

  modalBtn.addEventListener('click', submitName);
  modalInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitName();
  });

  socket.on('new user', function(data) {
    if (data.success) {
      modalOverlay.style.display = 'none';
      // welcome system msg
      var messages = document.getElementById('messages');
      var sys = document.createElement('li');
      sys.className = 'sys-msg';
      sys.textContent = 'Você entrou na sala como ' + nome;
      messages.appendChild(sys);
    } else {
      modalInput.style.borderColor = '#f76a8c';
      modalInput.value = '';
      modalInput.placeholder = 'Nome já em uso…';
      modalInput.focus();
    }
  });

  /* ── SEND ── */
  var input   = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');
  var form    = document.getElementById('form-area');

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendMessage() {
    var val = input.value.trim();
    if (!val || !nome) return;
    socket.emit('chat message', { msg: val, nome: nome });
    input.value = '';
    input.focus();
  }

  /* ── RECEIVE ── */
  socket.on('chat message', function(obj) {
    addMessage(obj, obj.nome === nome);
  });
</script>
</body>
</html>
